<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Property in CSS</title>
    <style>
        /* The margin property in CSS is used to create space around elements, outside of any defined borders.*/
        h1{
            margin-left: 2cm;
            margin-top: 1cm;
        }
        #a{
            margin-bottom: 3cm;
        }
/* The float property in CSS is used to position an element to the left or right of its container, 
allowing other content (like text) to wrap around it.
🔹 Possible Values
1.left → Element floats to the left
2.right → Element floats to the right
3.none → Default (no floating)
4.inherit → Inherits from parent
*/
        #ab{
            float: right;
            margin-right: 2cm;
            margin-top: 1cm;
        }
    </style>
</head>
<body>
    <img src="images/Eshwar.jpeg" alt="Eshwar" width="200px" height="200px" id="ab">
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1 id="a">My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
    <h1>My Name is Eshwara Naik </h1>
</body>
</html>
