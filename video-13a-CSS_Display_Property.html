<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>

    <style>
        #a{
            display: block;
            color: red;
            background-color: lightgray;
            margin:1cm;
        }
        #b{
            display: inline;
            color: green;
            background-color: lightseagreen;
            margin:1cm;
        }
        #c{
            display: inline-block;
            color: blue;
            background-color: lightblue;
            margin-left:2cm;
        }
         #ab{
            display: block;
            color: darkmagenta;
            background-color: lightcoral;
            margin:1cm;
         }
         span{
            background-color: lightpink;
             color: darkcyan;
             margin:1cm;
         }
    </style>
</head>
<body>
    <h1 id="a">Eshwara,  Display Block </h1>
    <h1 id="b">Eshwara, Display Inline </h1>
    <h1 id="c">Eshwara, Display Inline-Block </h1>
    <span id="ab">Eshwar Naik Welcome to CSS Display Property Class</span>
    <span>Eshwar Naik Welcome to CSS Display Property Class</span>
    

</body>
</html>
