<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Outline Property</title>
    <style>
        h1{
            border: 5px solid black;    
            padding: 10px;   
            margin: 20px;
            margin-top: 50px;     
        }
        #a{
            outline: 5px solid red;
            outline-offset: 10px;
        }
        #b{
            outline: 5px dashed blue;
            outline-offset: 10px;
        }
    </style>
</head>
<body>
    <h1>CSS Outline Property</h1>
    <h1 id="a">My Name is Eshwara Naik G</h1>
    <h1 id="b">My Name is Eshwara Naik G</h1>
</body>
</html>
