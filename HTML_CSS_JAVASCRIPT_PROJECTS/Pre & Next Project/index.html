<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="carousel">
  <div class="slides">
    <img src="https://picsum.photos/id/1015/800/400" class="slide active">
    <img src="https://picsum.photos/id/1016/800/400" class="slide">
    <img src="https://picsum.photos/id/1018/800/400" class="slide">
    <img src="https://images.pexels.com/photos/14960246/pexels-photo-14960246.jpeg?cs=srgb&dl=pexels-less-rock-14960246.jpg&fm=jpg" class="slide">  
    <img src="https://tse4.mm.bing.net/th/id/OIP.gabnTIrb9_VUBujEuAZp1QHaEK?pid=Api&h=220&P=0" class="slide">
</div>

  <button class="prev">&#10094;</button>
  <button class="next">&#10095;</button>

  <div class="dots"></div>
</div>

<script src="script.js"></script>
</body>
</html>
