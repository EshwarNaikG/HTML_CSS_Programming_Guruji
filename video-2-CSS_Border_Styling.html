<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Border Styling</title>
    <style>
        h1{
            border-width: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="border-style: dotted; background-color: aliceblue;">Wel come to our class. Border: Dotted</h1>
    <h1 style="border-style: solid; background-color: lightgray;">Computer class. Border: Solid</h1>
    <h1 style="border-style: dashed; background-color: lightyellow;">Python class. Border: Dashed</h1>
    <h1 style="border-style: double; background-color: lightgreen;">Java class. Border: Double</h1>
    <h1 style="border-style: groove; background-color: lightcoral;">JavaScript class. Border: Groove</h1>
    <h1 style="border-style: ridge; background-color: lightblue;">HTML class. Border: Ridge</h1>
    <h1 style="border-style: inset; background-color: lightpink;">CSS class. Border: Inset</h1>
    <h1 style="border-style: outset; background-color: lightcyan;">SQL class. Border: Outset</h1>
    <h1 style="border-style: hidden; background-color: lightgray;">Data Science class. Border: Hidden</h1>
</body>
</html>
