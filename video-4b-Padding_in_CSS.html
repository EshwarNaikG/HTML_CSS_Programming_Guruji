<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding in CSS </title>
    <style>
        /* The padding property in CSS is used to create space around an element's content, 
        inside of any defined borders. */
        h1{
            background-color: yellow;
            margin-left: 2cm;
            margin-top: 1cm;
            margin-right: 2cm;
        }
        #a{
            background-color: yellow;
            padding-left: 2cm;
        }
        #b{
            padding-bottom: 1cm;
        }
        #c{
            padding-right: 2cm;
        }
        #d{
            padding-top: 1cm;
        }
        
        /*Padding all sides */
        #e{
            padding: 1cm;
        }
    </style>
</head>
<body>
    <h1 id="a">Padding in CSS, padding left</h1>
    <h1 id="b">My Name is Eshwara Naik, padding bottom</h1>
    <h1 id="c">My Name is Eshwara Naik, padding right</h1>
    <h1 id="d">My Name is Eshwara Naik, padding top</h1>
    <h1 id="e">My Name is Eshwara Naik, padding all sides</h1>
    <h1>My Name is Eshwara Naik, no padding</h1>
    <h1>My Name is Eshwara Naik, no padding</h1>
</body>
</html>
