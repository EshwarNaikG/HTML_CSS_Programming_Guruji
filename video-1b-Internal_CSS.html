<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS</title>
    <style>
        h1{
            color: blue;
            font-size: 24px;
            background-color: lightgray;
        }
        h1:nth-child(2){
            color: green;
            font-size: 20px;
            background-color: yellow;
        }
        h1:nth-child(3){
            color: red;
            font-size: 18px;
            background-color: cyan;
        }
            p{
                color: purple;
                font-size: 16px;
                background-color: lightgreen;
                font-family: Arial, sans-serif;
                font-weight: bold;
            }
    </style>
</head>
<body>
    <h1> My Name is Eshwar Naik</h1>
    <h1> I am Full Stack Developer</h1>
    <h1> I am Python Developer</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Veritatis, 
        sit ipsum dignissimos soluta doloremque temporibus aut consequuntur 
        pariatur quis hic dolorem minima cum odio et doloribus distinctio, possimus quam rerum.</p>
</body>
</html>
